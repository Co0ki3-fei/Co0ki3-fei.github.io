<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Alice</title>
  <link rel="stylesheet" href="./CSS/one-debug.css">
  <link rel="stylesheet" href="./CSS/index.css">
</head>
<body>
  <header>
    <div class="m-tl ui-grid-row">
      <div class="m-tab ui-grid-2">
        <span>经路1</span>
      </div>
      <div class="m-tip ui-grid-13">
        <span>早</span>
        <span>乐</span>
      </div>
      <div class="m-fun ui-grid-3">
        <span>
          <img src="./img/icon-1.png" alt="404">
          定期代
        </span>
      </div>
    </div>
    <div class="m-bd">
      <div class="m-msg ui-grid-row">
        <div class="m-ts ui-grid-4">
          <span>09:10发 → 11:30着</span>
        </div>
        <div class="m-pr ui ui-grid-3">
          <span> 11,990円</span>
        </div>
      </div>
      <div class="m-ride_tip ui-grid-row">
        <div class="m-tt ui-grid-4">
          <span>2时间20分</span>
        </div>
        <div class="m-rt ui-grid-4">
          <span>2时间11分</span>
        </div>
        <div class="m-cht ui-grid-2">
          <span>1回</span>
        </div>
      </div>
    </div>
    <div class="m-ft ui-grid-row">
      <div class="ui-grid-14"></div>
      <div class="m-prt ui-grid-2">
        <span>
          <img src="./img/icon-2.png" alt="404">
          印刷
        </span>
      </div>
      <div class="m-copy ui-grid-2">
        <span>
          <img src="./img/icon-3.png" alt="404">
          テキスト
        </span>
      </div>
    </div>
  </header>
  <section>
    <div class="m-tl ui-grid-row">
      <div class=" ui-grid-11">
        <span>线路</span>
      </div>
      <div class=" ui-grid-2">
        <span>乘车位置</span>
      </div>
      <div class=" ui-grid-2">
        <span>运货</span>
      </div>
      <div class=" ui-grid-2">
        <span>指定席/料金</span>
      </div>
      <div class=" ui-grid-2">
        <span>距离</span>
      </div>
    </div>
    <div class="m-bd-mgw_top ui-grid-row">
      <div class="m-p_name ui-grid-9">
        <span>
          <img src="./img/icon-4.png" alt="404">
          <img src="./img/icon-5.png" alt="404">
          名古屋空港
        </span>
      </div>
      <div class="m-o_link ui-grid-9">
        <span>时刻表</span>
      </div>
    </div>
    <div class="m-bd-det ui-grid-row">
      <div class="m-det_t ui-grid-3">
        <span class="m-det_tt">09:10-09:40</span>
        <br>
        <span>30分</span>
      </div>
      <div class="p-icon-bus ui-grid-2">
        <span>
          <img src="./img/icon-6.png" alt="404">
          bus
        </span>
      </div>
      <div class="m-det_link ui-grid-6">
        <span>
          名古屋空港线[名古屋](名古屋
        </span>
        <br>
        <span>
          站前行)
        </span>
      </div>
      <div class="m-det_p ui-grid-2">
        <span>&nbsp;</span>
      </div>
      <div class="m-det_tp ui-grid-2">
        <span>700円</span>
      </div>
      <div class="m-det_op ui-grid-2">
        <span>&nbsp;</span>
      </div>
      <div class="m-det_x ui-grid-2">
        <span>&nbsp;</span>
      </div>
    </div>
    <div class="m-bd-mgwt_top ui-grid-row">
      <div class="m-nine ui-grid-3">
        <span>（9分）</span>
      </div>
      <div class="m-p_name ui-grid-8">
        <span>
          <img src="./img/icon-5.png" alt="404">
          名古屋站前/名古屋
        </span>
      </div>
      <div class="m-line ui-grid-2">
        <span>14番线发</span>
      </div>
      <div class="m-o_link ui-grid-5">
        <span>时刻表</span>&nbsp;<span>构内图</span>&nbsp;<span>路线图</span>&nbsp;<span>地图</span>
        <br>
        <span>クーホン</span>&nbsp;<span>グルメ</span>
      </div>
    </div>
    <div class="m-bd-det ui-grid-row">
      <div class="m-det_t ui-grid-3">
        <span class="m-det_tt">09:49-11:30</span>
        <br>
        <span>101分</span>
      </div>
      <div class="m-xu"></div>
      <div class="p-icon-train ui-grid-2">
        <span>
          <img src="./img/icon-7.png" alt="404">
          train
        </span>
      </div>
      <div class="m-det_link ui-grid-6">
        <span>のそみ310号(东京行)</span>
        <br>
        <span class="p-sp">出张バツク</span>
      </div>
      <div class="m-det_p ui-grid-2">
        <span>&nbsp;</span>
      </div>
      <div class="m-det_tp ui-grid-2">
        <span>6,260円</span>
      </div>
      <div class="m-det_op2 ui-grid-2">
        <span>
          指定席
          <br>
          5,030円
        </span>
      </div>
      <div class="m-det_x ui-grid-2">
        <span>366.0km</span>
      </div>
    </div>
    <div class="m-tokyo-top ui-grid-row">
      <div class="m-p_name ui-grid-4">
        <span>
          <img src="./img/icon-8.png" alt="404">
          <img src="./img/icon-5.png" alt="404">
          东京
        </span>
      </div>
      <div class="m-line ui-grid-4">
        <span>14番线着</span>
      </div>
      <div class="m-o_link ui-grid-5">
        <span>构内图</span>&nbsp;<span>路线图</span>&nbsp;<span>地图</span>
        <br>
        <span>クーホン</span>&nbsp;<span>グルメ</span>
      </div>

    </div>
  </section>
</body>
</html>
